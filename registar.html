<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECKED - Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="assets/decked-favicon.ico">
</head>
<body>
    <div class="stripe"></div>
    <div class="bottom-bar"></div>

    <div class="login-layout register-layout">
        <div class="brand-side">
            <div class="brand-content">
                <img class="logo" src="assets/decked-logo-full.png" alt="DECKED Logo">
                <h1>DECKED</h1>
                <p class="tagline">Ride . Style . Repeat</p>
            </div>
        </div>
        <div class="divider register-divider"></div>
        <div class="form-side">
            <div class="form-content">
                <h2 class="form-heading">Sign Up</h2>
                <div id="register-error" class="form-message form-message--error" style="display:none;"></div>
                <div id="register-success" class="form-message form-message--success" style="display:none;"></div>
                <form id="register-form">
                    <div class="form-group">
                        <label for="nome">Name</label>
                        <input type="text" id="nome" name="nome" maxlength="50" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" maxlength="50" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="senha">Password</label>
                        <input type="password" id="senha" name="senha" maxlength="50" placeholder="Choose a password" required>
                    </div>
                    <div class="form-group">
                        <label for="nif">NIF</label>
                        <input type="text" id="nif" name="nif" maxlength="9" placeholder="123456789" required>
                    </div>
                    <div class="form-group">
                        <label for="morada">Address</label>
                        <textarea id="morada" name="morada" rows="3" placeholder="Street, city, postcode" required></textarea>
                    </div>
                    <button type="submit" class="btn-login">Create Account</button>
                </form>
                <a href="index.html" class="auth-link">
                    Already have an account? <span>Log in</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();

            var errorEl = document.getElementById('register-error');
            var successEl = document.getElementById('register-success');
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            var nome = document.getElementById('nome').value.trim();
            var email = document.getElementById('email').value.trim();
            var senha = document.getElementById('senha').value;
            var nif = document.getElementById('nif').value.trim();
            var morada = document.getElementById('morada').value.trim();

            if (!/^\d{9}$/.test(nif)) {
                errorEl.textContent = 'NIF must be exactly 9 digits.';
                errorEl.style.display = 'block';
                return;
            }

            var users = JSON.parse(localStorage.getItem('decked_users') || '[]');

            var exists = users.some(function(u) { return u.email === email; });
            if (exists) {
                errorEl.textContent = 'An account with this email already exists.';
                errorEl.style.display = 'block';
                return;
            }

            var newUser = { nome: nome, email: email, senha: senha, nif: nif, morada: morada };
            users.push(newUser);
            localStorage.setItem('decked_users', JSON.stringify(users));

            successEl.textContent = 'Account created! Redirecting to login...';
            successEl.style.display = 'block';
            document.getElementById('register-form').style.display = 'none';

            setTimeout(function() {
                window.location.href = 'index.html';
            }, 2000);
        });
    </script>
</body>
</html>
