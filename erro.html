<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECKED - Error</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="assets/decked-favicon.ico">
    <meta http-equiv="refresh" content="5;url=index.html">
</head>
<body>
    <div class="stripe"></div>
    <div class="bottom-bar"></div>

    <div class="error-layout">
        <div class="error-content">
            <p class="error-code">401</p>
            <h1 class="error-heading">Wrong email<br>or password.</h1>
            <p class="error-sub">You don't have access to this area.</p>
            <p class="error-redirect">Redirecting you back in <span id="countdown">5</span>s...</p>
            <a href="index.html" class="error-link">Go now</a>
        </div>
    </div>

    <script>
        var n = 5;
        var el = document.getElementById('countdown');
        var interval = setInterval(function() {
            n--;
            el.textContent = n;
            if (n <= 0) clearInterval(interval);
        }, 1000);
    </script>
</body>
</html>
